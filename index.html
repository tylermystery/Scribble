<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scrabble Earthquake MVP</title>
    <style>
        :root { --primary: #d35400; --bg: #f4f1ea; --dark: #2c3e50; }
        body { font-family: sans-serif; background: var(--bg); display: flex; flex-direction: column; align-items: center; padding: 10px; margin: 0; }
        .container { max-width: 500px; width: 100%; background: white; padding: 15px; border-radius: 8px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); box-sizing: border-box; }
        h2 { color: var(--dark); margin-top: 0; text-align: center; }
        textarea { width: 100%; height: 80px; margin-bottom: 10px; border: 2px solid #ddd; border-radius: 4px; padding: 10px; box-sizing: border-box; font-size: 16px; }
        button { background: var(--primary); color: white; border: none; padding: 15px; cursor: pointer; font-weight: bold; width: 100%; border-radius: 4px; font-size: 18px; }
        #board-container { margin-top: 20px; display: grid; grid-template-columns: repeat(15, 1fr); grid-gap: 1px; background: #95a5a6; border: 2px solid var(--dark); }
        .tile { aspect-ratio: 1/1; background: #fff; display: flex; align-items: center; justify-content: center; font-weight: bold; font-size: 10px; text-transform: uppercase; border-radius: 1px; }
        .empty { background: #ecf0f1; }
        .debug-panel { margin-top: 20px; background: #222; color: #0f0; padding: 10px; font-family: monospace; font-size: 11px; border-radius: 4px; height: 150px; overflow-y: auto; width: 100%; box-sizing: border-box; }
        .stats { margin: 10px 0; font-weight: bold; color: var(--dark); }
    </style>
</head>
<body>

<div class="container">
    <h2>🌋 Earthquake</h2>
    <textarea id="inputLetters" placeholder="Paste words or letters here..."></textarea>
    <button onclick="triggerEarthquake()">TRIGGER METAMORPHOSIS</button>
    
    <div class="stats" id="stats">Ready...</div>
    <div id="board-container"></div>
    
    <div class="debug-panel" id="debug">-- Debug Console Active --</div>
</div>

<script>
// expanded mini-dictionary with "Loud" priorities
const DICT = [
    "JUKEBOX","QUARTZ","WIZARD","VEXED","AXIS","VIVID","VIBE","JUMP","ZOO","EXIT",
    "MOMS","BOARD","ROUTING","WHEEL","SLONE","DEAR","RELY","GEY","TAG","REX","CRY",
    "AERO","KING","LAZY","DOG","CAT","IN","TO","IT","HE","SHE","ME","UP","OR","AN"
];

const SIZE = 15;
let grid = Array(SIZE).fill(null).map(() => Array(SIZE).fill(''));

function log(msg) {
    const d = document.getElementById('debug');
    d.innerHTML += `<div>> ${msg}</div>`;
    d.scrollTop = d.scrollHeight;
}

function triggerEarthquake() {
    const raw = document.getElementById('inputLetters').value.toUpperCase();
    let pool = raw.replace(/[^A-Z]/g, '').split('');
    document.getElementById('debug').innerHTML = '';
    grid = Array(SIZE).fill(null).map(() => Array(SIZE).fill(''));
    
    log(`Detected ${pool.length} letters.`);
    
    // Sort dictionary by "Loudness" (Length + High Value Letters)
    const sortedDict = [...DICT].sort((a, b) => {
        const score = (w) => w.length + (/[QZJX]/.test(w) ? 15 : 0);
        return score(b) - score(a);
    });

    // 1. Place the first "Loud" word in the center
    let firstWord = "";
    for(let w of sortedDict) {
        if(canAfford(w, pool)) {
            place(w, 7, 4, true);
            pool = consume(w, pool);
            firstWord = w;
            log(`Seed word: ${w}`);
            break;
        }
    }

    if(!firstWord) { log("No words found in dictionary for these letters."); render(); return; }

    // 2. Iterative Building (Simple hook logic)
    let iterations = 0;
    let addedCount = 1;
    
    while(addedCount > 0 && iterations < 10) {
        addedCount = 0;
        iterations++;
        log(`Iteration ${iterations}: Attempting hooks...`);

        for(let r=0; r<SIZE; r++) {
            for(let c=0; c<SIZE; c++) {
                if(grid[r][c] !== '') {
                    const letterOnBoard = grid[r][c];
                    // Try to find a word in dict that contains this letter
                    for(let w of sortedDict) {
                        const charIdx = w.indexOf(letterOnBoard);
                        if(charIdx !== -1) {
                            // Try Vertical
                            if(canPlaceAt(w, r - charIdx, c, false, pool)) {
                                place(w, r - charIdx, c, false);
                                pool = consume(w.replace(letterOnBoard, ''), pool);
                                log(`Hooked ${w} vertically on ${letterOnBoard}`);
                                addedCount++;
                                break;
                            }
                            // Try Horizontal
                            if(canPlaceAt(w, r, c - charIdx, true, pool)) {
                                place(w, r, c - charIdx, true);
                                pool = consume(w.replace(letterOnBoard, ''), pool);
                                log(`Hooked ${w} horizontally on ${letterOnBoard}`);
                                addedCount++;
                                break;
                            }
                        }
                    }
                }
            }
        }
    }

    document.getElementById('stats').innerText = `Finished. Pool remaining: ${pool.join('')}`;
    render();
}

function canAfford(word, pool) {
    let p = [...pool];
    for(let c of word) {
        let i = p.indexOf(c);
        if(i === -1) return false;
        p.splice(i, 1);
    }
    return true;
}

function consume(word, pool) {
    let p = [...pool];
    for(let c of word) {
        let i = p.indexOf(c);
        if(i !== -1) p.splice(i, 1);
    }
    return p;
}

function canPlaceAt(word, r, c, horiz, pool) {
    if(r < 0 || c < 0) return false;
    if(horiz && c + word.length > SIZE) return false;
    if(!horiz && r + word.length > SIZE) return false;
    
    // Check for collisions (Simplified: only allow placement if it matches existing or hits empty)
    let neededFromPool = "";
    for(let i=0; i<word.length; i++) {
        let currR = horiz ? r : r + i;
        let currC = horiz ? c + i : c;
        let existing = grid[currR][currC];
        if(existing !== '' && existing !== word[i]) return false;
        if(existing === '') neededFromPool += word[i];
    }
    return canAfford(neededFromPool, pool);
}

function place(word, r, c, horiz) {
    for(let i=0; i<word.length; i++) {
        if(horiz) grid[r][c+i] = word[i];
        else grid[r+i][c] = word[i];
    }
}

function render() {
    const container = document.getElementById('board-container');
    container.innerHTML = '';
    for (let r = 0; r < SIZE; r++) {
        for (let c = 0; c < SIZE; c++) {
            const div = document.createElement('div');
            div.className = `tile ${grid[r][c] ? '' : 'empty'}`;
            div.innerText = grid[r][c];
            container.appendChild(div);
        }
    }
}
</script>
</body>
</html>
